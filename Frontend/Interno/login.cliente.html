<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Inter', sans-serif;
      }

      body {
        background: linear-gradient(135deg, #FFFFFF, #EFF6FF);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #0F172A;
      }

      .login-wrapper {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 20px 50px rgba(15, 23, 42, .10);
        padding: 48px 40px;
        width: 100%;
        max-width: 420px;
      }

      .login-wrapper h2 {
        font-size: 24px;
        font-weight: 700;
        color: #0F172A;
        margin-bottom: 8px;
      }

      .login-wrapper p.subtitle {
        font-size: 14px;
        color: #64748B;
        margin-bottom: 32px;
      }

      .logo {
        font-size: 22px;
        font-weight: 800;
        color: #2563EB;
        margin-bottom: 28px;
        display: block;
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      input {
        width: 100%;
        padding: 14px 16px;
        border: 1.5px solid #E2E8F0;
        border-radius: 10px;
        font-size: 14px;
        color: #0F172A;
        background: #F8FAFC;
        outline: none;
        transition: border-color .2s, box-shadow .2s;
      }

      input::placeholder {
        color: #94A3B8;
      }

      input:focus {
        border-color: #2563EB;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
        background: #fff;
      }

      .btn-primario {
        width: 100%;
        padding: 14px;
        background: #2563EB;
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        box-shadow: 0 8px 24px rgba(37, 99, 235, .25);
        transition: background .2s, transform .2s;
        margin-top: 4px;
      }

      .btn-primario:hover {
        background: #1D4ED8;
        transform: translateY(-2px);
      }

      .btn-primario:active {
        transform: translateY(0);
      }

      #msgLogin {
        margin-top: 4px;
        font-size: 13px;
        text-align: center;
        min-height: 20px;
        color: #EF4444;
      }

      .forgot {
        text-align: center;
        margin-top: 4px;
      }

      .forgot a {
        font-size: 13px;
        color: #2563EB;
        text-decoration: none;
        font-weight: 500;
      }

      .forgot a:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>

    <div class="login-wrapper">
      <span class="logo">SupportTech</span>

      <h2>Login de Acesso</h2>
      <p class="subtitle">Entre com suas credenciais para continuar.</p>

      <form id="formulario">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="senha" placeholder="Senha">
        <button type="submit" class="btn-primario">Acesso Interno</button>
        <div id="msgLogin"></div>
        <div class="forgot"><a href="#">Esqueci minha senha</a></div>
      </form>
    </div>

    <script type="module" src="../js/logins.js"></script>

  </body>
</html>
