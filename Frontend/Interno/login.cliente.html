<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style/login.cliente.css">
  </head>

  <body>

    <div class="login-wrapper">
      <span class="logo">Era<span>Solutions</span></span>

      <h2>Login de Acesso</h2>
      <p class="subtitle">Entre com suas credenciais para continuar.</p>

      <form id="formulario">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="senha" placeholder="Senha">
        <button type="submit" class="btn-primario">Acesso Interno</button>
        <div id="msgLogin"></div>
        <div class="forgot"><a href="#">Esqueci minha senha</a></div>
      </form>
    </div>

    <script type="module" src="../js/logins.js"></script>

  </body>
</html>
