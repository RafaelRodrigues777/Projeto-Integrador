<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Painel Administrativo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <link rel="stylesheet" href="../style/interno.css">
</head>
<body>

<div class="painel-container">

  <aside class="sidebar">
    <div class="sidebar__logo">
      <i class="ti ti-building-store"></i> Meu Painel
    </div>
    <nav class="sidebar__nav">
      <span class="sidebar__grupo-label">Menu</span>
      <a class="sidebar__link" href="produto.html"><i class="ti ti-box"></i> Produtos</a>
      <a class="sidebar__link" href="relatorios.html"><i class="ti ti-file-analytics"></i> Relatórios</a>
      <a class="sidebar__link sidebar__link--ativo" href="dashboard.html"><i class="ti ti-chart-pie"></i> Dashboard</a>
      <span class="sidebar__grupo-label">Conta</span>
      <a class="sidebar__link" href="configuracoes.html"><i class="ti ti-settings"></i> Configurações</a>
    </nav>
    <div class="sidebar__rodape">
      <a class="sidebar__link" href="../index.html"><i class="ti ti-logout"></i> Sair</a>
    </div>
  </aside>

  <div class="conteudo-principal">
    <header class="topbar">
      <span class="topbar__titulo" id="nome-pagina-atual">Dashboard</span>
    </header>

    <main class="painel-conteudo">

      <div class="cards-container">
        <div class="card-dashboard">
          <div class="card-icone"><i class="ti ti-currency-real"></i></div>
          <div class="card-faturamento">
            <span class="card-titulo">Faturamento</span>
            <h2 id="card-faturamento">--</h2>
          </div>
        </div>
        <div class="card-dashboard">
          <div class="card-icone"><i class="ti ti-shopping-cart"></i></div>
          <div class="card-pedidos">
            <span class="card-titulo">Pedidos</span>
            <h2 id="card-pedidos">--</h2>
          </div>
        </div>
        <div class="card-dashboard">
          <div class="card-icone"><i class="ti ti-users"></i></div>
          <div class="card-clientes">
            <span class="card-titulo">Clientes</span>
            <h2 id="card-clientes">--</h2>
          </div>
        </div>
        <div class="card-dashboard">
          <div class="card-icone"><i class="ti ti-package"></i></div>
          <div class="card-produtos">
            <span class="card-titulo">Produtos</span>
            <h2 id="card-produtos">--</h2>
          </div>
        </div>
      </div>

      <div style="display: flex; flex-direction: column; gap: 20px;">

        <details class="card-dashboard" style="display: block; width: 100%;" open>
          <summary class="card-titulo" style="font-size: 15px; font-weight: 600; color: var(--clr-ink); cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center;">
            Quais produtos mais vendem?
            <i class="ti ti-chevron-down" style="font-size: 1.1rem; color: var(--text-muted);"></i>
          </summary>
          <div style="width:100%; height:300px; margin-top: 20px;" onclick="event.stopPropagation();">
            <canvas id="PrimeiroGrafico"></canvas>
          </div>
        </details>

        <details class="card-dashboard" style="display: block; width: 100%;" open>
          <summary class="card-titulo" style="font-size: 15px; font-weight: 600; color: var(--clr-ink); cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center;">
            Quais vendedores geram mais receita?
            <i class="ti ti-chevron-down" style="font-size: 1.1rem; color: var(--text-muted);"></i>
          </summary>
          <div style="width:100%; height:300px; margin-top: 20px;" onclick="event.stopPropagation();">
            <canvas id="SegundoGrafico"></canvas>
          </div>
        </details>

        <details class="card-dashboard" style="display: block; width: 100%;" open>
          <summary class="card-titulo" style="font-size: 15px; font-weight: 600; color: var(--clr-ink); cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center;">
            Quais regiões apresentam melhor desempenho?
            <i class="ti ti-chevron-down" style="font-size: 1.1rem; color: var(--text-muted);"></i>
          </summary>
          <div style="width:100%; height:300px; margin-top: 20px;" onclick="event.stopPropagation();">
            <canvas id="TerceiroGrafico"></canvas>
          </div>
        </details>

        <details class="card-dashboard" style="display: block; width: 100%;" open>
          <summary class="card-titulo" style="font-size: 15px; font-weight: 600; color: var(--clr-ink); cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center;">
            Existe relação entre faturamento e satisfação?
            <i class="ti ti-chevron-down" style="font-size: 1.1rem; color: var(--text-muted);"></i>
          </summary>
          <div style="width:100%; height:300px; margin-top: 20px;" onclick="event.stopPropagation();">
            <canvas id="QuartoGrafico"></canvas>
          </div>
        </details>

      </div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../js/dashboard.js"></script>

</body>
</html>
