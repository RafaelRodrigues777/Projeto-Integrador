<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Painel Administrativo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <style> /* ==========================================================================
   PAINEL ADMINISTRATIVO — MINIMALISTA, CLEAN & SEM LATERAL AZUL
   ========================================================================== */

:root {
  /* --- SUA PALETA DE CORES --- */
  --clr-stone:      #d4cdc5; /* Bordas premium, divisores finos e linhas */
  --clr-steel:      #5b88a5; /* Azul Frio: Apenas para Hover, Links e Foco ativo */
  --clr-offwhite:   #f4f4f2; /* Fundo geral da aplicação e inputs */
  --clr-ink:        #191013; /* Grafite Escuro: Texto principal e títulos */
  --clr-navy:       #243a69; /* Azul Profundo: Usado pontualmente em botões primários */

  /* --- CONFIGURAÇÃO SEMÂNTICA --- */
  --bg-app:         var(--clr-offwhite);
  --bg-sidebar:     #ffffff; /* Lateral agora é branca/clean */
  --bg-card:        #ffffff;
  --text-main:      var(--clr-ink);
  --text-muted:     #757f8c;
  --border-ui:      rgba(212, 205, 197, 0.6); /* clr-stone perfeito para tabelas */
  --transition-fast: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
}

/* RESET & CONFIGURAÇÕES GERAIS */
* { 
  box-sizing: border-box; 
  margin: 0; 
  padding: 0; 
}

body { 
  font-family: 'Inter', system-ui, -apple-system, sans-serif; 
  background: var(--bg-app); 
  color: var(--text-main); 
  -webkit-font-smoothing: antialiased;
}

/* LAYOUT PRINCIPAL */
.painel-container { 
  display: flex; 
  height: 100vh; 
}

/* SIDEBAR ULTRA CLEAN (SEM AZUL) */
.sidebar {
  width: 250px;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border-ui);
  display: flex;
  flex-direction: column;
  padding: 24px 16px;
  flex-shrink: 0;
}

.sidebar__logo {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--clr-ink);
  padding: 0 8px 20px;
  border-bottom: 1px solid var(--border-ui);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.sidebar__logo i {
  color: var(--clr-steel);
  font-size: 1.3rem;
}

.sidebar__nav {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.sidebar__grupo-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 0 8px;
  margin: 18px 0 6px;
}

.sidebar__link {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text-muted);
  text-decoration: none;
  transition: all var(--transition-fast);
}

.sidebar__link i { 
  font-size: 1.15rem; 
  color: var(--text-muted);
}

.sidebar__link:hover { 
  background: var(--clr-offwhite); 
  color: var(--clr-ink); 
}

.sidebar__link:hover i {
  color: var(--clr-steel);
}

/* Item Ativo - Realce sutil com sua cor Steel */
.sidebar__link--ativo { 
  background: rgba(91, 136, 165, 0.08); 
  color: var(--clr-steel); 
  font-weight: 600; 
}

.sidebar__link--ativo i {
  color: var(--clr-steel);
}

.sidebar__rodape { 
  margin-top: auto; 
  border-top: 1px solid var(--border-ui); 
  padding-top: 16px; 
}

/* CONTEÚDO DA DIREITA */
.conteudo-principal { 
  flex: 1; 
  display: flex; 
  flex-direction: column; 
  overflow: hidden; 
}

/* TOPBAR */
.topbar {
  height: 64px;
  background: #ffffff;
  border-bottom: 1px solid var(--border-ui);
  display: flex;
  align-items: center;
  padding: 0 32px;
  flex-shrink: 0;
}

.topbar__titulo { 
  font-size: 1.05rem; 
  font-weight: 600; 
  color: var(--clr-ink);
}

.topbar__acoes {
  margin-left: auto;
  display: flex;
  gap: 10px;
}

/* BOTÕES */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  border-radius: 6px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border-ui);
  background: #ffffff;
  color: var(--clr-ink);
  transition: all var(--transition-fast);
}

.btn:hover { 
  background: var(--clr-offwhite); 
  border-color: var(--clr-steel);
}
.btn:active { transform: scale(0.98); }

.btn--primario {
  background: var(--clr-navy);
  color: #ffffff;
  border-color: transparent;
}
.btn--primario:hover { 
  background: #1a2c52; 
  box-shadow: 0 4px 12px rgba(36, 58, 105, 0.15);
}

.btn--perigo { 
  color: #b84d4d; 
  border-color: #e6c5c5; 
  background: #ffffff;
}
.btn--perigo:hover { 
  background: #fff6f6; 
  border-color: #b84d4d;
}

/* CONTEÚDO INTERNO */
.painel-conteudo { 
  flex: 1; 
  padding: 32px; 
  overflow-y: auto; 
}

.painel-header { margin-bottom: 28px; }
.painel-header__titulo { font-size: 1.5rem; font-weight: 700; color: var(--clr-ink); letter-spacing: -0.01em; }
.painel-header__subtitulo { font-size: 0.9rem; color: var(--text-muted); margin-top: 0.25rem; }

/* CARDS DO DASHBOARD */
.cards-container {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  margin-bottom: 32px;
}

.card-dashboard {
  flex: 1;
  min-width: 240px;
  background: var(--bg-card);
  border: 1px solid var(--border-ui);
  border-radius: 8px;
  padding: 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  transition: all var(--transition-fast);
}

.card-dashboard:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(25, 16, 19, 0.02);
  border-color: var(--clr-steel);
}

.card-icone {
  width: 48px;
  height: 48px;
  border-radius: 6px;
  background: var(--clr-offwhite);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  color: var(--clr-steel);
  flex-shrink: 0;
  border: 1px solid var(--border-ui);
}

.card-titulo {
  display: block;
  color: var(--text-muted);
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 4px;
}

.card-dashboard h2 {
  margin: 0;
  font-size: 1.65rem;
  font-weight: 700;
  color: var(--clr-ink);
  line-height: 1.1;
}

/* ==========================================================================
   A TABELA BONITA & MODERNA (ESTILO SAAS PREMIUM)
   ========================================================================== */
.container-tabela {
  background-color: var(--bg-card);
  border: 1px solid var(--border-ui);
  border-radius: 8px;
  box-shadow: 0 4px 12px rgba(25, 16, 19, 0.01);
  overflow: hidden;
}

.tabela-dados {
  width: 100%;
  border-collapse: collapse;
  text-align: left;
  font-size: 0.875rem;
}

/* Cabeçalho Minimalista */
.tabela-dados th {
  background-color: #fafafa;
  padding: 1.1rem 1.5rem;
  font-weight: 600;
  color: var(--clr-ink);
  border-bottom: 2px solid var(--border-ui);
  text-transform: uppercase;
  font-size: 0.75rem;
  letter-spacing: 0.06em;
  user-select: none;
}

/* Linhas com espaçamento perfeito */
.tabela-dados td {
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--border-ui);
  color: var(--clr-ink);
  font-weight: 500;
  transition: background-color var(--transition-fast);
}

.tabela-dados tbody tr:last-child td {
  border-bottom: none;
}

/* Hover Sutil na linha */
.tabela-dados tbody tr:hover td {
  background-color: rgba(91, 136, 165, 0.04); /* Realce leve em azul steel */
}

/* Colunas Especiais */
.tabela-dados__id {
  width: 90px;
  color: var(--text-muted) !important;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 0.8rem;
}

.alinhamento-direita { text-align: right; }
.alinhamento-centro { text-align: center; }

/* Ações da linha do CRUD */
.acoes-linha {
  display: flex;
  gap: 6px;
  justify-content: flex-end;
}

.btn-tabela {
  background: #ffffff;
  border: 1px solid var(--border-ui);
  padding: 0.4rem;
  border-radius: 6px;
  cursor: pointer;
  color: var(--text-muted);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast);
}

.btn-tabela:hover {
  border-color: var(--clr-steel);
  color: var(--clr-steel);
  background-color: #ffffff;
}

.btn-tabela--deletar:hover {
  border-color: #d98888;
  color: #b84d4d;
  background-color: #fff6f6;
}

/* RESPONSIVIDADE */
@media(max-width: 900px) {
  .card-dashboard { min-width: calc(50% - 12px); }
}
@media(max-width: 600px) {
  .painel-container { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .card-dashboard { min-width: 100%; }
}   </style>
  </head>
<body>

<div class="painel-container">

  <aside class="sidebar">
    <div class="sidebar__logo">
      <i class="ti ti-building-store"></i> Meu Painel
    </div>

    <nav class="sidebar__nav" aria-label="Navegação do Painel">
      <span class="sidebar__grupo-label">Menu</span>
      <a class="sidebar__link sidebar__link--ativo" href="produto.html">
        <i class="ti ti-box"></i> Produtos
      </a>
      <a class="sidebar__link" href="relatorios.html">
        <i class="ti ti-file-analytics"></i> Novo registro
      </a>
      <a class="sidebar__link" href="dashboard.html">
        <i class="ti ti-chart-pie"></i> Dashboard
      </a>

      <span class="sidebar__grupo-label">Conta</span>
      <a class="sidebar__link" href="configuracoes.html">
        <i class="ti ti-settings"></i> Configurações
      </a>
    </nav>

    <div class="sidebar__rodape">
        <a class="sidebar__link" href="../index.html">
          <i class="ti ti-logout"></i> Sair
        </a>
    </div>
  </aside>

  <div class="conteudo-principal">

    <header class="topbar">
        <span class="topbar__titulo" id="nome-pagina-atual">Produtos</span>

        <div class="topbar__acoes">
            <button class="btn btn--primario" type="button">
              <i class="ti ti-plus"></i> Novo Produto
            </button>
        </div>
    </header>

    <main class="painel-conteudo">
        
        <div class="painel-header">
          <h2 class="painel-header__titulo">Gerenciamento de Estoque</h2>
          <p class="painel-header__subtitulo">Visualize e edite as informações dos seus produtos cadastrados.</p>
        </div>

        <div class="container-tabela">
          <table class="tabela-dados">
            <thead>
              <tr>
                <th class="tabela-dados__id">ID</th>
                <th>Produto</th>
                <th>Categoria</th>
                <th class="alinhamento-direita">Preço Unitário</th>
                <th class="alinhamento-direita" style="width: 80px;">Ações</th>
              </tr>
            </thead>
            <tbody id="corpo-tabela-produtos">
              <tr>
                <td class="tabela-dados__id">#001</td>
                <td><strong>Componente Eletrônico X</strong></td>
                <td>Automação</td>
                <td class="alinhamento-direita">R$ 150,00</td>
                <td>
                  <div class="acoes-linha">
                    <button class="btn-tabela btn-tabela--deletar" title="Excluir Produto" type="button">
                      <i class="ti ti-trash"></i>
                    </button>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

    </main>

  </div>
</div>

<script src="../js/produto.js"></script>
</body>
</html>
