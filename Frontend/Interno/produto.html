<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Painel Administrativo — Produtos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
    <link rel="stylesheet" href="../style/interno.css">

    <style>
      * { 
        box-sizing: border-box; 
        margin: 0; 
        padding: 0; 
      }

      body { 
        font-family: 'Inter', sans-serif; 
        background: #f5f5f3; 
        color: var(--clr-ink); 
      }

      .painel-container { 
        display: flex; 
        height: 100vh; 
      }

      /* SIDEBAR */
      .sidebar {
        width: 220px;
        background: #ffffff;
        border-right: 1px solid var(--border-ui);
        display: flex;
        flex-direction: column;
        padding: 20px 12px;
        flex-shrink: 0;
      }

      .sidebar__logo {
        font-size: 0.95rem;
        font-weight: 600;
        padding: 0 8px 20px;
        border-bottom: 1px solid var(--border-ui);
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--clr-ink);
      }

      .sidebar__grupo-label {
        font-size: 0.7rem;
        color: #999;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        padding: 0 8px;
        margin: 12px 0 6px;
        display: block;
        font-weight: 600;
      }

      .sidebar__link {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        border-radius: 8px;
        font-size: 0.88rem;
        color: #555;
        text-decoration: none;
        transition: background 0.15s, color 0.15s;
        width: 100%;
      }

      .sidebar__link:hover { 
        background: #f0f0ee; 
        color: var(--clr-ink); 
      }
      
      .sidebar__link--ativo { 
        background: #f0f0ee; 
        color: var(--clr-ink); 
        font-weight: 500; 
      }
      
      .sidebar__link i { 
        font-size: 1.05rem; 
        flex-shrink: 0; 
      }

      .sidebar__rodape { 
        margin-top: auto; 
        border-top: 1px solid var(--border-ui); 
        padding-top: 12px; 
      }

      /* MAIN */
      .conteudo-principal { 
        flex: 1; 
        display: flex; 
        flex-direction: column; 
        overflow: hidden; 
      }

      .topbar {
        height: 56px;
        background: #ffffff;
        border-bottom: 1px solid var(--border-ui);
        display: flex;
        align-items: center;
        padding: 0 24px;
        flex-shrink: 0;
      }

      .topbar__titulo { 
        font-size: 0.95rem; 
        font-weight: 500; 
        color: var(--clr-ink);
      }

      .topbar__acoes { 
        margin-left: auto; 
        display: flex; 
        gap: 8px; 
      }

      /* CONTEÚDO */
      .painel-conteudo { 
        flex: 1; 
        padding: 24px; 
        overflow-y: auto; 
      }

      .painel-header { 
        margin-bottom: 20px; 
      }
      
      .painel-header h2 { 
        font-size: 1.15rem; 
        font-weight: 500; 
        margin-bottom: 4px; 
        color: var(--clr-ink);
      }
      
      .painel-header p { 
        font-size: 0.82rem; 
        color: #777; 
      }

      /* TABELA */
      .container-tabela {
        background: #ffffff;
        border: 1px solid var(--border-ui);
        border-radius: 12px;
        overflow: hidden;
      }

      /* Toolbar com busca */
      .tabela-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border-ui);
        background: #fafaf8;
        gap: 12px;
        flex-wrap: wrap;
      }

      .busca-wrapper { 
        position: relative; 
        flex: 1; 
        max-width: 300px; 
      }

      .busca-wrapper i {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        color: #bbb;
        font-size: 0.95rem;
        pointer-events: none;
      }

      .busca-input {
        width: 100%;
        padding: 8px 12px 8px 32px;
        border: 1px solid var(--border-ui);
        border-radius: 6px;
        font-size: 0.82rem;
        background: #ffffff;
        color: var(--clr-ink);
        outline: none;
        transition: border-color 0.15s;
        font-family: 'Inter', sans-serif;
      }

      .busca-input:focus { 
        border-color: var(--clr-steel); 
      }
      
      .busca-input::placeholder { 
        color: #ccc; 
      }

      .total-label { 
        font-size: 0.75rem; 
        color: #aaa; 
        white-space: nowrap; 
      }

      /* Estrutura dos Dados */
      .tabela-dados { 
        width: 100%; 
        border-collapse: collapse; 
        font-size: 0.82rem; 
      }

      .tabela-dados thead { 
        background: #f5f5f3; 
        border-bottom: 1px solid var(--border-ui); 
      }

      .tabela-dados th {
        padding: 11px 16px;
        text-align: left;
        font-weight: 600;
        font-size: 0.7rem;
        color: #999;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        white-space: nowrap;
      }

      .tabela-dados tbody tr:nth-child(even) { 
        background: #fafaf8; 
      }
      
      .tabela-dados tbody tr:hover { 
        background: #f0f0ee; 
        transition: background 0.1s; 
      }

      .tabela-dados td {
        padding: 13px 16px;
        color: #444;
        border-bottom: 1px solid #f0f0ee;
        vertical-align: middle;
      }

      .tabela-dados tbody tr:last-child td { 
        border-bottom: none; 
      }

      /* ID discreto */
      .tabela-dados td:first-child { 
        color: #ccc; 
        font-size: 0.75rem; 
      }

      .nome-produto { 
        font-weight: 500; 
        color: var(--clr-ink); 
      }

      .alinhamento-direita { 
        text-align: right !important; 
      }

      /* Estado vazio/loading */
      .estado-vazio {
        text-align: center;
        padding: 48px 24px;
        color: #ccc;
        font-size: 0.82rem;
      }

      .estado-vazio i { 
        font-size: 2rem; 
        display: block; 
        margin-bottom: 10px; 
      }

      /* Rodapé */
      .tabela-rodape {
        padding: 9px 16px;
        border-top: 1px solid var(--border-ui);
        background: #fafaf8;
        font-size: 0.75rem;
        color: #bbb;
        text-align: right;
      }

      /* BADGES */
      .badge {
        display: inline-block;
        font-size: 0.7rem;
        padding: 3px 9px;
        border-radius: 99px;
        font-weight: 500;
        white-space: nowrap;
      }

      .badge-success { background: #e6f5ec; color: #1a7a3c; }
      .badge-warning { background: #fff8e1; color: #a06000; }
      .badge-info    { background: #e8f0fe; color: #1a56db; }
      .badge-neutral { background: #f0f0ee; color: #555; }
    </style>
  </head>

  <body>
    <div class="painel-container">

      <aside class="sidebar">
        <div class="sidebar__logo">
          <i class="ti ti-building-store"></i> Meu Painel
        </div>

        <nav aria-label="Navegação do Painel">
          <span class="sidebar__grupo-label">Menu</span>
          <a class="sidebar__link sidebar__link--ativo" href="produto.html">
            <i class="ti ti-box"></i> Produtos
          </a>
          <a class="sidebar__link" href="relatorios.html">
            <i class="ti ti-file-analytics"></i> Relatórios
          </a>
          <a class="sidebar__link" href="dashboard.html">
            <i class="ti ti-chart-pie"></i> Dashboard
          </a>

          <span class="sidebar__grupo-label">Conta</span>
          <a class="sidebar__link" href="configuracoes.html">
            <i class="ti ti-settings"></i> Configurações
          </a>
        </nav>

        <div class="sidebar__rodape">
          <a class="sidebar__link" href="../index.html">
            <i class="ti ti-logout"></i> Sair
          </a>
        </div>
      </aside>

      <div class="conteudo-principal">

        <header class="topbar">
          <span class="topbar__titulo">Produtos</span>
          <div class="topbar__acoes">
            <button class="btn btn--perigo">
              <i class="ti ti-trash"></i> Excluir
            </button>
            <button class="btn btn--primario">
              <i class="ti ti-plus"></i> Novo Produto
            </button>
          </div>
        </header>

        <main class="painel-conteudo">

          <div class="painel-header">
            <h2>Gerenciamento de Estoque</h2>
            <p>Visualize e edite as informações dos seus produtos cadastrados.</p>
          </div>

          <div class="container-tabela">

            <div class="tabela-toolbar">
              <div class="busca-wrapper">
                <i class="ti ti-search"></i>
                <input
                  class="busca-input"
                  type="text"
                  id="campo-busca"
                  placeholder="Buscar produto..."
                  oninput="filtrarTabela()"
                />
              </div>
              <span class="total-label" id="contador-produtos"></span>
            </div>

            <table class="tabela-dados">
              <thead>
                <tr>
                  <th style="width:60px;">ID</th>
                  <th>Produto</th>
                  <th>Categoria</th>
                  <th class="alinhamento-direita">Preço Unitário</th>
                </tr>
              </thead>
              <tbody id="corpo-tabela-produtos">
                <tr id="linha-loading">
                  <td colspan="4" class="estado-vazio">
                    <i class="ti ti-loader"></i>
                    Carregando produtos...
                  </td>
                </tr>
              </tbody>
            </table>

            <div class="tabela-rodape" id="rodape-tabela"></div>

          </div>
        </main>
      </div>
    </div>

    <script>
      // Atualiza contador e rodapé
      function atualizarContador() {
        const linhas = document.querySelectorAll('#corpo-tabela-produtos tr[data-linha]');
        const visiveis = [...linhas].filter(tr => tr.style.display !== 'none').length;
        const total = linhas.length;

        document.getElementById('contador-produtos').textContent =
          visiveis === total
            ? `${total} produto${total !== 1 ? 's' : ''}`
            : `${visiveis} de ${total} produto${total !== 1 ? 's' : ''}`;

        document.getElementById('rodape-tabela').textContent =
          total > 0 ? `${total} registro${total !== 1 ? 's' : ''} no banco de dados` : '';
      }

      // Filtro de busca
      function filtrarTabela() {
        const termo = document.getElementById('campo-busca').value.toLowerCase();
        const linhas = document.querySelectorAll('#corpo-tabela-produtos tr[data-linha]');
        const tbody = document.getElementById('corpo-tabela-produtos');

        linhas.forEach(tr => {
          tr.style.display = tr.textContent.toLowerCase().includes(termo) ? '' : 'none';
        });

        // Mensagem "sem resultado"
        let semResultado = document.getElementById('sem-resultado');
        const algumVisivel = [...linhas].some(tr => tr.style.display !== 'none');

        if (!algumVisivel && termo) {
          if (!semResultado) {
            const tr = document.createElement('tr');
            tr.id = 'sem-resultado';
            tr.innerHTML = `<td colspan="4" class="estado-vazio">
              <i class="ti ti-mood-sad"></i>
              Nenhum produto encontrado para "<strong>${termo}</strong>"
            </td>`;
            tbody.appendChild(tr);
          }
        } else if (semResultado) {
          semResultado.remove();
        }

        atualizarContador();
      }

      // Observer: detecta quando o seu JS insere linhas vindas do banco
      const observer = new MutationObserver(() => {
        // Remove o loading quando aparecerem dados reais
        const loading = document.getElementById('linha-loading');
        const temDados = document.querySelectorAll('#corpo-tabela-produtos tr:not(#linha-loading):not(#sem-resultado)').length > 0;
        if (loading && temDados) loading.remove();

        // Marca cada linha nova para seleção
        document.querySelectorAll('#corpo-tabela-produtos tr:not([data-linha]):not(#linha-loading):not(#sem-resultado)').forEach(tr => {
          tr.setAttribute('data-linha', '');
        });

        atualizarContador();
      });

      observer.observe(document.getElementById('corpo-tabela-produtos'), { childList: true, subtree: true });
    </script>

    <script src="../js/produto.js"></script>
  </body>
</html>
