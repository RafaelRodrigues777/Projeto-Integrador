<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Painel</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f3; color: #1a1a18; }

    .layout { display: flex; height: 100vh; }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      background: #fff;
      border-right: 0.5px solid #ddd;
      display: flex;
      flex-direction: column;
      padding: 20px 12px;
      flex-shrink: 0;
    }
    .sidebar-logo {
      font-size: 15px;
      font-weight: 500;
      padding: 0 8px 20px;
      border-bottom: 0.5px solid #ddd;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-label {
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0 8px;
      margin: 12px 0 6px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      color: #555;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      transition: background 0.15s;
    }
    .nav-item:hover { background: #f0f0ee; color: #1a1a18; }
    .nav-item.active { background: #f0f0ee; color: #1a1a18; font-weight: 500; }
    .nav-item i { font-size: 17px; flex-shrink: 0; }
    .sidebar-bottom { margin-top: auto; border-top: 0.5px solid #ddd; padding-top: 12px; }

    /* MAIN */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .topbar {
      height: 56px;
      background: #fff;
      border-bottom: 0.5px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }
    .topbar-title { font-size: 15px; font-weight: 500; }
    .topbar-actions { display: flex; gap: 8px; }

    /* BOTÕES */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      border: 0.5px solid #ccc;
      background: transparent;
      color: #1a1a18;
      transition: background 0.15s;
    }
    .btn:hover { background: #f0f0ee; }
    .btn:active { transform: scale(0.98); }
    .btn i { font-size: 15px; }

    .btn-primary {
      background: #1a1a18;
      color: #fff;
      border-color: transparent;
    }
    .btn-primary:hover { opacity: 0.85; background: #1a1a18; }

    .btn-danger { color: #c0392b; border-color: #f5c6c6; }
    .btn-danger:hover { background: #fff0f0; }

    /* CONTENT */
    .content { flex: 1; padding: 24px; overflow-y: auto; }
    .page-header { margin-bottom: 20px; }
    .page-header h2 { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
    .page-header p { font-size: 13px; color: #777; }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    .card { background: #efefed; border-radius: 8px; padding: 14px 16px; }
    .card-label { font-size: 12px; color: #777; margin-bottom: 6px; }
    .card-value { font-size: 22px; font-weight: 500; }

    .section {
      background: #fff;
      border: 0.5px solid #ddd;
      border-radius: 12px;
      padding: 16px 20px;
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .section-header span { font-size: 14px; font-weight: 500; }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 0.5px solid #eee;
      font-size: 13px;
      color: #555;
    }
    .row:last-child { border-bottom: none; }
    .row strong { color: #1a1a18; font-weight: 500; }

    .badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 99px;
    }
    .badge-success { background: #e6f5ec; color: #1a7a3c; }
    .badge-warning { background: #fff8e1; color: #a06000; }
  </style>
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <i class="ti ti-bolt"></i> Painel
    </div>

    <span class="nav-label">Menu</span>
    <button class="nav-item active" onclick="setPage(this, 'Início')"><i class="ti ti-home"></i> Início</button>
    <button class="nav-item" onclick="setPage(this, 'Projetos')"><i class="ti ti-folder"></i> Projetos</button>
    <button class="nav-item" onclick="setPage(this, 'Tarefas')"><i class="ti ti-check"></i> Tarefas</button>
    <button class="nav-item" onclick="setPage(this, 'Relatórios')"><i class="ti ti-chart-bar"></i> Relatórios</button>
    <button class="nav-item" onclick="setPage(this, 'Calendário')"><i class="ti ti-calendar"></i> Calendário</button>

    <span class="nav-label">Conta</span>
    <button class="nav-item" onclick="setPage(this, 'Configurações')"><i class="ti ti-settings"></i> Configurações</button>

    <div class="sidebar-bottom">
      <button class="nav-item" onclick="setPage(this, 'Perfil')"><i class="ti ti-user"></i> Perfil</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <span class="topbar-title" id="page-title">Início</span>
      <div class="topbar-actions">
        <button class="btn btn-danger" onclick="alert('Excluído')"><i class="ti ti-trash"></i> Excluir</button>
        <button class="btn" onclick="alert('Exportado')"><i class="ti ti-download"></i> Exportar</button>
        <button class="btn btn-primary" onclick="alert('Novo item criado')"><i class="ti ti-plus"></i> Novo</button>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content">
      <div class="page-header">
        <h2>Visão geral</h2>
        <p>Resumo das atividades recentes</p>
      </div>

      <div class="cards">
        <div class="card"><div class="card-label">Projetos ativos</div><div class="card-value">12</div></div>
        <div class="card"><div class="card-label">Tarefas pendentes</div><div class="card-value">38</div></div>
        <div class="card"><div class="card-label">Concluídas</div><div class="card-value">91</div></div>
      </div>

      <div class="section">
        <div class="section-header">
          <span>Atividade recente</span>
          <button class="btn" style="padding:4px 10px; font-size:12px;">Ver tudo</button>
        </div>
        <div class="row"><strong>Site redesign</strong> <span class="badge badge-success">Em andamento</span></div>
        <div class="row"><strong>App mobile</strong> <span class="badge badge-warning">Aguardando</span></div>
        <div class="row"><strong>API de pagamentos</strong> <span class="badge badge-success">Em andamento</span></div>
        <div class="row"><strong>Dashboard analytics</strong> <span class="badge badge-success">Concluído</span></div>
      </div>
    </div>

  </div>
</div>

<script>
  function setPage(el, name) {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('page-title').textContent = name;
  }
</script>

</body>
</html>
